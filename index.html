<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Fondo animado -->
  <div class="sky" id="sky"></div>
  <div class="stars" id="stars"></div>
  <div class="clouds" id="clouds">
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
  </div>
  <div class="rain-container" id="rain"></div>
  <div class="snow-container" id="snow"></div>

  <div class="app">

    <header>
      <div class="brand">🌤️ Weather APP</div>
      <button class="geo-btn" id="geoBtn" onclick="autoLocate()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        </svg>
        Mi ubicación
      </button>
    </header>

    <!-- Buscador -->
    <div class="search-wrap">
      <input class="search-input" id="cityInput" type="text"
        placeholder="Buscar ciudad… ej. Madrid, Tokyo, NYC"
        onkeydown="if(event.key==='Enter') searchCity()">
      <button class="search-btn" id="searchBtn" onclick="searchCity()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    </div>

    <!-- Estado / error -->
    <div id="statusArea"></div>

    <!-- Tarjeta principal -->
    <div class="card" id="mainCard"></div>

    <!-- Pronóstico -->
    <div class="forecast-card" id="forecastCard"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
